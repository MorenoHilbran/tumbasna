name: Auto Deploy to VPS

on:
  push:
    branches:
      - main # Akan berjalan setiap kali ada push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy ke VPS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 15m
          script: |
            cd /opt/tumbasna
            echo "1. Fetching latest changes from origin..."
            git fetch --all
            git reset --hard origin/main
            echo "2. Enforcing Unix line endings on deploy.sh..."
            sed -i 's/\r$//' deploy.sh
            chmod +x deploy.sh
            echo "3. Running deployment..."
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S bash deploy.sh

