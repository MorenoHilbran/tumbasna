name: Auto Deploy to VPS

on:
  push:
    branches:
      - main # Akan berjalan setiap kali ada push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy ke VPS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          # Force sync git repository and clean line endings on the VPS first, then execute deploy.sh
          script: |
            cd /opt/tumbasna
            echo "1. Fetching latest changes from origin..."
            git fetch --all
            echo "2. Forcing reset to origin/main..."
            git reset --hard origin/main
            echo "3. Enforcing Unix line endings on deploy.sh..."
            sed -i 's/\r$//' deploy.sh
            echo "4. Making deploy.sh executable..."
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S chmod +x deploy.sh
            echo "5. Running deploy.sh..."
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S ./deploy.sh

