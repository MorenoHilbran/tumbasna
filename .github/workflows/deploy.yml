name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd ~/projects/ivolate
            git pull origin main
            docker stop ivolate_app 2>/dev/null || true
            docker rm ivolate_app 2>/dev/null || true
            docker compose --env-file ./ivolate-dashboard/.env up --build -d
