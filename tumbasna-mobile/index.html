<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tumbasna - Rantai Pasok Pangan Digital UMKM</title>
    
    <base href="/" />
    
    <meta name="color-scheme" content="light" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="description" content="Tumbasna - Platform Rantai Pasok Pangan Digital modern yang menghubungkan UMKM dengan supplier dan petani lokal secara cepat, aman, dan transparan." />
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    
    <!-- Preload Critical Resources -->
    <link rel="preload" href="/logotum.png" as="image" type="image/png" />
    <link rel="preload" href="/src/main.tsx" as="script" />
    
    <!-- add to homescreen for ios -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Tumbasna" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- DNS Prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
    <link rel="dns-prefetch" href="https://api.tumbasna.my.id" />

    <!-- Preconnect for critical external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts: Plus Jakarta Sans (optimized with display=swap) -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    
    <!-- Font Awesome (defer loading) -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" /></noscript>

    <!-- Inline Critical CSS for Splash Screen -->
    <style>
      /* Critical splash screen styles for instant render */
      body {
        margin: 0;
        padding: 0;
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #root {
        min-height: 100vh;
        background: #f4f8f2;
      }
      
      /* Initial loading state */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: linear-gradient(180deg, #f4f8f2 0%, #e8f2e5 40%, #dbebd7 75%, #cfe3ca 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        z-index: 9999;
        box-sizing: border-box;
      }
      
      .initial-loader-content {
        text-align: center;
        margin-top: 10vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      
      .initial-loader-logo {
        width: 84px;
        height: 84px;
        overflow: hidden;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        margin: 0 auto 14px;
        filter: drop-shadow(0 8px 18px rgba(0, 104, 55, 0.14));
      }

      .initial-loader-logo img {
        height: 84px;
        width: auto;
        max-width: none;
        object-fit: cover;
        object-position: left;
      }
      
      .initial-loader-text {
        font-size: 40px;
        font-weight: 800;
        color: #154625;
        margin: 0;
        line-height: 1.1;
      }
      
      .initial-loader-text span {
        color: #8cc63f;
      }

      .initial-loader-divider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin: 14px 0;
      }

      .initial-loader-divider-line {
        width: 50px;
        height: 1.5px;
        background: rgba(21, 70, 37, 0.22);
      }

      .initial-loader-tagline {
        font-size: 15px;
        font-weight: 600;
        color: #374e3e;
        margin: 0;
        line-height: 1.5;
      }

      .initial-loader-tagline span {
        font-weight: 800;
        font-style: italic;
        color: #154625;
      }

      .initial-loader-bottom {
        width: 100%;
        background: #f7faf4;
        border-radius: 28px 28px 0 0;
        padding: 24px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <!-- Initial Loading Screen (before React hydrates) -->
    <div id="root">
      <div class="initial-loader">
        <div class="initial-loader-content">
          <div class="initial-loader-logo">
            <img src="/logotum.png" alt="Tumbasna" />
          </div>
          <h1 class="initial-loader-text">Tumbas<span>Na</span></h1>
          <div class="initial-loader-divider">
            <div class="initial-loader-divider-line"></div>
            <span style="font-size: 7px; color: #154625;">◆</span>
            <div class="initial-loader-divider-line"></div>
          </div>
          <p class="initial-loader-tagline">
            Pasar Digital Terpercaya<br />
            untuk <span>UMKM Indonesia</span>
          </p>
        </div>
        <div class="initial-loader-bottom">
          <p style="font-size: 13px; font-weight: 600; color: #27432e; margin: 0;">Memuat aplikasi...</p>
        </div>
      </div>
    </div>
    
    <!-- Midtrans Snap Script (diaktifkan saat VITE_PAYMENT_MODE=midtrans) -->
    <!-- <script type="text/javascript" src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="Mid-client-PjI0Nu76GIkFIqVR" defer></script> -->
    
    <!-- Main App Script -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
