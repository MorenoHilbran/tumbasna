<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tumbasna - Rantai Pasok Pangan Digital UMKM</title>
    
    <base href="/" />
    
    <meta name="color-scheme" content="light" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="description" content="Tumbasna - Platform Rantai Pasok Pangan Digital modern yang menghubungkan UMKM dengan supplier dan petani lokal secara cepat, aman, dan transparan." />
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    
    <!-- Preload Critical Resources -->
    <link rel="preload" href="/spsc.webp" as="image" type="image/webp" />
    <link rel="preload" href="/logotum.png" as="image" type="image/png" />
    <link rel="preload" href="/src/main.tsx" as="script" />
    
    <!-- add to homescreen for ios -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Tumbasna" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- DNS Prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
    <link rel="dns-prefetch" href="https://api.tumbasna.my.id" />

    <!-- Preconnect for critical external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts: Plus Jakarta Sans (optimized with display=swap) -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    
    <!-- Font Awesome (defer loading) -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" /></noscript>

    <!-- Inline Critical CSS for Splash Screen -->
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      
      #root {
        min-height: 100vh;
        background: #f7f9f4;
      }
      
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: #f7f9f4 url('/spsc.webp') no-repeat center bottom;
        background-size: cover;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        z-index: 9999;
        box-sizing: border-box;
      }
      
      .initial-loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        margin-top: 13vh;
      }
      
      .initial-loader-logo-wrap {
        width: 88px;
        height: 88px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        margin-bottom: 12px;
        filter: drop-shadow(0 10px 20px rgba(0, 104, 55, 0.15));
      }

      .initial-loader-logo-img {
        height: 88px;
        width: auto;
        max-width: none;
        object-fit: cover;
        object-position: left;
      }
      
      .initial-loader-text {
        font-size: 40px;
        font-weight: 900;
        color: #006837;
        margin: 0;
        line-height: 1.1;
        letter-spacing: -1.2px;
      }
      
      .initial-loader-text span {
        color: #8CC63F;
      }

      .initial-loader-divider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin: 16px 0;
        opacity: 0.85;
      }

      .initial-loader-line {
        width: 60px;
        height: 1.5px;
        background: linear-gradient(90deg, transparent, #006837, transparent);
      }

      .initial-loader-diamond {
        width: 7px;
        height: 7px;
        background: #006837;
        transform: rotate(45deg);
        border-radius: 1px;
      }

      .initial-loader-tagline {
        font-size: 16px;
        font-weight: 600;
        color: #2D3748;
        line-height: 1.5;
        margin: 0;
      }

      .initial-loader-tagline span {
        font-weight: 800;
        font-style: italic;
        color: #006837;
      }

      .initial-loader-card {
        width: calc(100% - 36px);
        max-width: 400px;
        background: rgba(247, 249, 244, 0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 28px;
        padding: 18px 24px 22px;
        margin-bottom: 28px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.06), 0 2px 6px rgba(0, 0, 0, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.8);
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
      }

      .initial-loader-progress {
        width: 100%;
        height: 8px;
        background: #E2E8F0;
        border-radius: 99px;
        overflow: hidden;
      }

      .initial-loader-bar {
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #006837 0%, #8CC63F 60%, #F7941D 100%);
        border-radius: 99px;
        animation: initialPulse 1.5s ease-in-out infinite alternate;
      }

      @keyframes initialPulse {
        0% { width: 20%; }
        100% { width: 85%; }
      }
    </style>
  </head>
  <body>
    <!-- Initial Loading Screen (before React hydrates) -->
    <div id="root">
      <div class="initial-loader">
        <div class="initial-loader-content">
          <div class="initial-loader-logo-wrap">
            <img src="/logotum.png" alt="Tumbasna" class="initial-loader-logo-img" />
          </div>
          <h1 class="initial-loader-text">Tumbas<span>Na</span></h1>
          <div class="initial-loader-divider">
            <div class="initial-loader-line"></div>
            <div class="initial-loader-diamond"></div>
            <div class="initial-loader-line"></div>
          </div>
          <p class="initial-loader-tagline">
            Pasar Digital Terpercaya<br />
            untuk <span>UMKM Indonesia</span>
          </p>
        </div>
        <div class="initial-loader-card">
          <div class="initial-loader-progress">
            <div class="initial-loader-bar"></div>
          </div>
          <p style="font-size: 13px; font-weight: 600; color: #006837; margin: 14px 0 0 0;">
            Memuat pengalaman terbaik untuk Anda...
          </p>
        </div>
      </div>
    </div>
    
    <!-- Main App Script -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
