server {
    server_name tumbasna.my.id www.tumbasna.my.id dashboard.tumbasna.my.id api.tumbasna.my.id;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tumbasna.my.id-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tumbasna.my.id-0001/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    server_name app.tumbasna.my.id;
    root /opt/tumbasna/tumbasna-mobile/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tumbasna.my.id-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tumbasna.my.id-0001/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = api.tumbasna.my.id) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = dashboard.tumbasna.my.id) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = www.tumbasna.my.id) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = tumbasna.my.id) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name tumbasna.my.id www.tumbasna.my.id dashboard.tumbasna.my.id api.tumbasna.my.id;
    return 404; # managed by Certbot
}

server {
    if ($host = mobile.tumbasna.my.id) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name mobile.tumbasna.my.id;
    return 404; # managed by Certbot
}
